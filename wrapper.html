<!DOCTYPE html>
<html>
  <body style="margin:0;padding:0;overflow:hidden;">
    <script>
      var params = window.location.search;
      var hasPopup = params && new URLSearchParams(params).get('popup');
      if (hasPopup) {
        // Deep link: redirect directly so rfe_products_updated.html owns the URL
        window.location.replace('rfe_products_updated.html' + params);
      } else {
        // Normal entry: keep iframe wrapper
        var iframe = document.createElement('iframe');
        iframe.src = 'rfe_products_updated.html' + params;
        iframe.style.cssText = 'border:none;width:100%;height:100vh;display:block;';
        document.body.appendChild(iframe);
      }
    </script>
  </body>
</html>
